name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for every job; jobs widen only if they must.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install golangci-lint from source
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Run golangci-lint
        run: golangci-lint run ./...

      - name: Audit context spine
        run: make audit-ctx

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run tests with coverage
        run: go test -v -coverprofile=coverage.out ./...

      - name: Report coverage
        run: go tool cover -func=coverage.out | tail -1

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below the 80% minimum"
            exit 1
          fi

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Run govulncheck
        run: |
          # JSON mode always exits 0; we parse the findings ourselves.
          # govulncheck is pinned via the `tool` directive in go.mod (tracked by
          # Dependabot's golang-x group); invoked here with `go tool`.
          go tool govulncheck -json ./... > /tmp/vulncheck.json
          # Count REACHABLE vulnerabilities (trace frame with a called function)
          # in third-party modules. stdlib/toolchain issues require a Go update,
          # not a dependency bump, so they don't fail this job.
          THIRD_PARTY=$(jq -s '
            [ .[] | .finding // empty
              | select(.trace[0].function != null)
              | .trace[0].module
              | select(. != "stdlib" and . != "toolchain")
            ] | unique | length' /tmp/vulncheck.json)
          if [ "$THIRD_PARTY" -gt 0 ]; then
            echo "::error::${THIRD_PARTY} third-party vulnerability(ies) found"
            go tool govulncheck ./...
            exit 1
          fi
          echo "No third-party vulnerabilities (stdlib-only issues require a Go update)"

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so gitleaks scans all commits
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      # Run the gitleaks binary directly (built from source, pinned by version)
      # instead of gitleaks-action, which requires a GITLEAKS_LICENSE for orgs.
      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Scan git history for secrets
        run: gitleaks git --redact -v .

  osv-scan:
    name: OSV Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build all targets
        run: make build-all

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Static analysis of the workflows themselves (injection, excessive
      # permissions, credential persistence, unpinned actions). pipx is
      # preinstalled on GitHub-hosted runners; zizmor is pinned by version.
      - name: Run zizmor
        run: pipx run zizmor==1.25.2 --min-severity=medium .github/workflows/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
