version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    # Release quarantine: ignore versions newer than 7 days, dodging
    # the window when most hijacked/yanked packages are caught.
    cooldown:
      default-days: 7
    groups:
      golang-x:
        patterns:
          - "golang.org/x/*"
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
